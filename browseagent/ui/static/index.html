<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrowseAgent</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">&#9673; BrowseAgent</span>
      <span class="version">v0.1.0</span>
    </div>
    <div class="topbar-center">
      <span id="connection-badge" class="badge badge-disconnected">Disconnected</span>
      <span id="state-badge" class="badge badge-idle">Idle</span>
    </div>
    <div class="topbar-right">
      <label>Max Steps
        <input id="max-steps-input" type="number" value="40" min="1" max="200" />
      </label>
    </div>
  </header>

  <!-- Main Split Layout -->
  <main class="split-pane">
    <!-- Left Panel: Command + Execution Log -->
    <section class="left-panel">
      <!-- Task Input -->
      <div class="task-input-area">
        <textarea id="task-input" rows="3" placeholder="Describe your task... e.g. &quot;go to books.toscrape.com and get the first 5 book titles&quot;"></textarea>
        <div class="task-actions">
          <button id="btn-run" class="btn btn-primary">
            <span class="btn-icon">&#9654;</span> Run
          </button>
        </div>
      </div>

      <!-- Plan Card -->
      <div id="plan-card" class="card hidden">
        <div class="card-header">Plan</div>
        <div class="card-body">
          <div id="plan-goal" class="plan-line"></div>
          <div id="plan-summary" class="plan-line muted"></div>
          <div id="plan-url" class="plan-line url"></div>
          <div id="plan-steps" class="plan-line muted"></div>
        </div>
      </div>

      <!-- Execution Log -->
      <div class="log-area">
        <div class="log-header">
          <span>Execution Log</span>
          <button id="btn-clear-log" class="btn btn-sm btn-ghost">Clear</button>
        </div>
        <div id="step-log" class="step-log"></div>
      </div>

      <!-- Results -->
      <div id="results-area" class="results-area hidden">
        <div class="card-header">Extracted Data</div>
        <div id="results-table-wrapper" class="results-table-wrapper"></div>
      </div>
    </section>

    <!-- Resize Handle -->
    <div class="divider" id="divider"></div>

    <!-- Right Panel: Browser View -->
    <section class="right-panel">
      <div class="browser-header">
        <span class="browser-title">Browser View</span>
        <div class="browser-controls">
          <button id="btn-takeover" class="btn btn-sm btn-warn" disabled>
            <span class="btn-icon">&#9995;</span> Take Control
          </button>
          <button id="btn-pause" class="btn btn-sm btn-ghost" disabled>
            <span class="btn-icon">&#10074;&#10074;</span> Pause
          </button>
          <button id="btn-resume" class="btn btn-sm btn-ghost hidden" disabled>
            <span class="btn-icon">&#9654;</span> Resume
          </button>
          <button id="btn-stop" class="btn btn-sm btn-danger" disabled>
            <span class="btn-icon">&#9632;</span> Stop
          </button>
        </div>
      </div>
      <div class="browser-viewport" id="browser-viewport">
        <div id="browser-placeholder" class="browser-placeholder">
          <div class="placeholder-icon">&#127760;</div>
          <div class="placeholder-text">Browser will appear here when a task is running</div>
        </div>
        <img id="browser-screenshot" class="browser-screenshot hidden" alt="Browser view" />
        <!-- Takeover input overlay — transparent, captures clicks/keys -->
        <div id="takeover-input-layer" class="takeover-input-layer hidden" tabindex="0"></div>
      </div>
      <!-- Takeover Banner (compact, non-blocking) -->
      <div id="takeover-banner" class="takeover-banner hidden">
        <span class="takeover-banner-icon">&#9995;</span>
        <span><strong>Manual Control Active</strong> &mdash; Click and type directly on the browser view above</span>
        <button id="btn-resume-takeover" class="btn btn-sm btn-primary">
          <span class="btn-icon">&#9654;</span> Resume Automation
        </button>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
